<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevSutra Coding Quiz</title>
  <link rel="stylesheet" href="css/quiz page.css">
  <link rel="icon" href="assets/images/logo.png">
</head>

<body>

<!-- ================= PAGE WRAPPER ================= -->
<div class="page-wrapper">

  <!-- ================= NAVBAR ================= -->
  <nav class="navbar">
    <div class="logo"><img src="assets/images/logo.png" alt="DevSutra Logo">
    <span>DevSutra Quiz</span></div>

    <div class="nav-controls">
      <select id="category">
        <option value="18">Computer Science</option>
      </select>

      <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
      </select>

      <button id="startBtn">Start Quiz</button>
    </div>
  </nav>


  <!-- ================= MAIN CONTENT ================= -->
  <main class="main-content">

    <!-- ===== QUIZ BOX ===== -->
    <div class="quiz-box hidden" id="quizBox">

      <div class="quiz-header">
        <span id="questionNumber"></span>
        <span id="timer">30</span>
      </div>

      <h2 id="question">Question Text</h2>

      <div id="options" class="options-container"></div>

      <button id="nextBtn" class="hidden next-btn">Next Question</button>

    </div>


    <!-- ===== RESULT BOX ===== -->
    <div class="result-box hidden" id="resultBox">

      <div class="result-header">
        <div class="score-circle" id="finalScore">0/0</div>
        <div class="performance" id="performanceText"></div>
      </div>

      <h3>Review Wrong Answers</h3>
      <div class="review-section" id="reviewSection"></div>

      <button class="result-btn" onclick="location.reload()">Restart Quiz</button>

    </div>

  </main>


  <!-- ================= FOOTER ================= -->
  <footer class="footer">
    <p>© 2026 DevSutra | Coding Quiz Platform 🚀</p>
  </footer>

</div>

<script src="js/quiz page.js"></script>
</body>
</html>
